services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: oddshub
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: oddshub
    ports:
      - "5431:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  oddshub:
    build:
      context: .
      dockerfile: ./docker/oddshub/Dockerfile
    depends_on:
      - db
    env_file:
      - configs/.env
    environment:
      DATABASE_URL: postgres://oddshub:secret@db:5432/oddshub?sslmode=disable
    ports:
      - "8080:8080"
    volumes:
      - ./oddshub:/app/oddshub

volumes:
  pgdata:
